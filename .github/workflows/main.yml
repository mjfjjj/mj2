name: Daily Data Update

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 北京时间 16:30
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tushare akshare pandas numpy pyarrow

      - name: Run update script
        run: python lianban_rolling.py

      - name: Commit and push updated data
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add rolling_cache.parquet
          git diff --cached --quiet || (git commit -m "Auto update data [skip ci]" && git push)
